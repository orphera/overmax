[package]
name = "overmax-app"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[[bin]]
name = "overmax-rs"
path = "src/main.rs"

[dependencies]
overmax-core = { path = "../overmax_core" }
overmax-data = { path = "../overmax_data" }
overmax_cv = { path = "../overmax_cv" }
windows-sys = { version = "0.61.2", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_UI_WindowsAndMessaging",
] }
