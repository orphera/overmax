name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.97.0

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal --component clippy
          rustup override set ${{ env.RUST_VERSION }}
      - name: Build
        run: cargo build --workspace --locked
      - name: Test
        run: cargo test --workspace --locked
      - name: Clippy
        if: runner.os == 'Linux'
        run: cargo clippy --workspace --all-targets --locked

  linux-x11-lifecycle:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal
          rustup override set ${{ env.RUST_VERSION }}
      - name: Install X11 test stack
        run: |
          sudo apt-get update
          sudo apt-get install --yes openbox xauth xvfb
          dpkg-query --show openbox xvfb
      - name: Test X11 tracker and capture lifecycle
        run: bash .github/scripts/linux-m1-lifecycle.sh
